notifications:
  commits: private@security.apache.org
  issues: private@security.apache.org
  pullrequests: private@security.apache.org
  discussions: private@security.apache.org

staging:
  profile:

publish:
  whoami: asf-site

github:
  description: "Website sources for the Apache Security website"
  homepage: https://security.apache.org
  labels:
    - apache
    - security
    - hugo
    - website
  features:
    issues: true
  rulesets:
    - name: "Default Branch Protection"
      type: branch
      branches:
        includes:
          - "~DEFAULT_BRANCH"
          - "release/*"
          - "rel/*"
        excludes: []
      bypass_teams:
        - root
      restrict_deletion: true
      restrict_force_push: true
